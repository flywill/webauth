<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebAuth Portal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
      color: #1a1a2e;
    }

    .container {
      text-align: center;
      padding: 3rem 2rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 2rem;
    }

    .links {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      display: inline-block;
      padding: 0.85rem 2rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      font-size: 1rem;
      color: #fff;
      background: #1a1a2e;
      transition: background 0.2s ease, transform 0.15s ease;
    }

    .links a:hover {
      background: #16213e;
      transform: translateY(-2px);
    }

    .links a:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>WebAuth Portal</h1>
    <div class="links">
      <a href="custom_consent/consent.html">Custom Consent</a>
      <a href="custom_webauth/login.html">Custom WebAuth Login</a>
    </div>
  </div>
</body>
</html>
